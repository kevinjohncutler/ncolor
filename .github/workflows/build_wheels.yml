name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish target"
        type: choice
        required: true
        default: "none"
        options: ["none", "testpypi", "pypi"]
  push:
    tags: ["v*"]

# Concurrency: cancel in-flight runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.cell.os }} ${{ matrix.cell.archs_linux }}${{ matrix.cell.archs_windows }}${{ matrix.cell.archs_macos }} · ${{ matrix.python }}
    runs-on: ${{ matrix.cell.os }}
    strategy:
      fail-fast: false
      # 5 archs × 4 Pythons = 20 parallel jobs. Each builds ONE wheel
      # via CIBW_BUILD=${{ matrix.python }}-* (pattern borrowed from
      # opencodecs), so cibuildwheel's per-cell 4-Python serial loop
      # becomes 4-way parallel. Wall-clock per row drops by ~3-4×.
      # Trade: 4× CI minutes (free on public repos). ncolor has no
      # heavyweight BEFORE_ALL step, so no cache-warm complication.
      matrix:
        python: ["cp311", "cp312", "cp313", "cp314"]
        cell:
          - {os: ubuntu-latest,    archs_linux: "x86_64"}
          - {os: ubuntu-24.04-arm, archs_linux: "aarch64"}
          - {os: windows-latest,   archs_windows: "AMD64"}
          - {os: windows-11-arm,   archs_windows: "ARM64"}
          - {os: macos-latest,     archs_macos: "arm64"}
        # Skipped (covered by sdist):
        #   - macos-13 x86_64 — Apple stopped shipping Intel hardware in
        #                       2020; user base ≈ 0, GitHub's Intel
        #                       runners have multi-hour queues.
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs the full history for version

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          output-dir: ./wheelhouse
        env:
          CIBW_ARCHS_LINUX: ${{ matrix.cell.archs_linux }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.cell.archs_windows }}
          CIBW_ARCHS_MACOS: ${{ matrix.cell.archs_macos }}
          # One wheel per job — overrides the default in
          # pyproject.toml's [tool.cibuildwheel] build = "...".
          CIBW_BUILD: "${{ matrix.python }}-*"

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.cell.os }}-${{ matrix.cell.archs_linux }}${{ matrix.cell.archs_windows }}${{ matrix.cell.archs_macos }}-${{ matrix.python }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error

  publish_testpypi:
    name: Publish → TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Manual workflow_dispatch with publish=testpypi.
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ncolor
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish → PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Tag pushes auto-publish; workflow_dispatch with publish=pypi also works.
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/ncolor
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
