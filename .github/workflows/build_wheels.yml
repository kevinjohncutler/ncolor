name: Build Wheels

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish: 'no' (artifact only), 'testpypi', or 'pypi'"
        type: choice
        required: true
        default: "no"
        options: [no, testpypi, pypi]
  push:
    tags: ["v*"]

# Concurrency: cancel in-flight runs of the same workflow on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.os }} ${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            archs_linux: "x86_64"
          - os: ubuntu-24.04-arm
            archs_linux: "aarch64"
          - os: windows-latest
            archs_windows: "AMD64"
          - os: windows-11-arm
            archs_windows: "ARM64"
            cibw_build: "cp311-* cp312-* cp313-* cp314-*"  # cp310 lacks win_arm64 wheels
          - os: macos-13
            archs_macos: "x86_64"
          - os: macos-latest
            archs_macos: "arm64"
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools_scm needs the full history for version

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.3.1
        with:
          output-dir: ./wheelhouse
        env:
          # ``cibw_build`` matrix override beats the [tool.cibuildwheel] default
          # for the Windows ARM64 row.
          CIBW_BUILD: ${{ matrix.cibw_build || '' }}
          CIBW_ARCHS_LINUX: ${{ matrix.archs_linux }}
          CIBW_ARCHS_WINDOWS: ${{ matrix.archs_windows }}
          CIBW_ARCHS_MACOS: ${{ matrix.archs_macos }}

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.archs_linux }}${{ matrix.archs_windows }}${{ matrix.archs_macos }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error

  build_sdist:
    name: Build sdist
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: ./dist/*.tar.gz
          if-no-files-found: error

  publish_testpypi:
    name: Publish → TestPyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Manual workflow_dispatch with publish=testpypi.
    if: >
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.publish == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/ncolor
    permissions:
      id-token: write  # OIDC for trusted publishing
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          skip-existing: true

  publish_pypi:
    name: Publish → PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Tag pushes auto-publish; workflow_dispatch with publish=pypi also works.
    if: >
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')) ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.publish == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/ncolor
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: pypa/gh-action-pypi-publish@release/v1
